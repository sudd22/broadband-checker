name: Deploy Frontend

on:
    push:
        branches: [main]
        paths:
            - "frontend/**"

permissions:
    contents: read
    id-token: write
    security-events: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: cd frontend && npm ci

            - name: Build
              run: cd frontend && VITE_API_URL=/api npm run build

            - name: Configure Aws Credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
                  aws-region: eu-west-2

            - name: Preflight — ensure S3 bucket exists
              run: |
                  aws s3api head-bucket --bucket "${{ secrets.S3_BUCKET }}" 2>/dev/null \
                    || { echo "::error::S3 bucket not found — run terraform-apply before deploying frontend"; exit 1; }

            - name: Sync assets (immutable cache)
              run: |
                  aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET }}/ \
                    --delete \
                    --exclude "index.html" \
                    --cache-control "public, max-age=31536000, immutable"

            - name: Upload index.html (no-cache)
              run: |
                  aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
                    --cache-control "no-cache, no-store" \
                    --content-type "text/html; charset=utf-8"
