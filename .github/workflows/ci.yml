name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            lambda/package-lock.json

      - name: Frontend install
        run: cd frontend && npm ci

      - name: Frontend lint
        run: cd frontend && npm run lint

      - name: Frontend type-check
        run: cd frontend && npm run type-check

      - name: Frontend test
        run: cd frontend && npm test -- --run

      - name: Frontend build (demo mode)
        run: cd frontend && VITE_API_URL=/demo npm run build

      - name: Lambda install
        run: cd lambda && npm ci

      - name: Lambda lint
        run: cd lambda && npm run lint

      - name: Lambda test
        run: cd lambda && npm test

      - name: Snyk frontend scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package.json

      - name: Snyk lambda scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=lambda/package.json

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true
          skip_check: >-
            CKV_AWS_144,
            CKV2_AWS_62,
            CKV_AWS_116

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive
