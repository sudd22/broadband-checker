name: Terraform Plan
on:
    pull_request:
        branches: [main]
        paths:
            - "terraform/**"

permissions:
    contents: read
    id-token: write
    pull-requests: write

jobs:
    plan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: "~1.7"

            - name: Configure Aws Credentials (read-only OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
                  aws-region: eu-west-2
            - name: Terraform init
              run: terraform -chdir=terraform init -input=false
            - name: Terraform validate
              run: terraform -chdir=terraform validate

            - name: Terraform plan
              id: plan
              run: |
                  terraform -chdir=terraform plan \
                  -var="ofcom_api_key=placeholder" \
                  -var="domain_name=${{ secrets.CLOUDFRONT_DOMAIN }}" \
                  -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
                  -lock=false \
                  -input=false \
                  -out=tfplan \
                  -no-color 2>&1 | tee plan.txt

            - name: Upload plan artifact
              uses: actions/upload-artifact@v4
              with:
                  name: terraform-plan
                  path: terraform/tfplan
                  retention-days: 5

            - name: Commit plan on PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs   = require('fs');
                      const plan = fs.readFileSync('plan.txt', 'utf8');
                      const body = `## Terraform Plan\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner:        context.repo.owner,
                        repo:         context.repo.repo,
                        body
                      });
